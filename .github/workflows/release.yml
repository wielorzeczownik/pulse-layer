name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "overlay/src/**"
      - "overlay/index.html"
      - "overlay/package.json"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare-release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.bump.outputs.released }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      commit_changes: ${{ steps.bump.outputs.commit_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev pkg-config \
            libxkbcommon-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev

      - name: Install overlay dependencies
        run: npm ci
        working-directory: overlay

      - name: Determine next version (git-cliff)
        id: cliff_bumped
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --bumped-version
        env:
          OUTPUT: bumped-version.txt
          GITHUB_REPO: ${{ github.repository }}

      - name: Bump project version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          current_version=$(awk -F'"' '/^version\s*=\s*"/ { print $2; exit }' Cargo.toml)
          next_tag="${{ steps.cliff_bumped.outputs.content }}"
          next_tag=$(echo "$next_tag" | tr -d '[:space:]')

          if [[ -z "$next_tag" ]]; then
            echo "Unable to determine next version from git-cliff"
            exit 1
          fi

          if [[ "$next_tag" != v* ]]; then
            next_tag="v$next_tag"
          fi

          next_version="${next_tag#v}"
          current_tag="v$current_version"
          has_current_tag="false"
          if git rev-parse -q --verify "refs/tags/${current_tag}" >/dev/null; then
            has_current_tag="true"
          fi

          if [[ "$next_version" == "$current_version" ]]; then
            if [[ "$has_current_tag" == "false" ]]; then
              echo "No bump from git-cliff, but no current tag exists. Creating initial release for ${current_tag}."
              echo "released=true" >> "$GITHUB_OUTPUT"
              echo "version=$current_version" >> "$GITHUB_OUTPUT"
              echo "tag=$current_tag" >> "$GITHUB_OUTPUT"
              echo "commit_changes=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "No user-facing commits since ${current_tag}. Nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            echo "tag=$current_tag" >> "$GITHUB_OUTPUT"
            echo "commit_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(printf '%s\n' "$current_version" "$next_version" | sort -V | tail -1)" != "$next_version" ]]; then
            echo "git-cliff returned $next_version which is lower than current $current_version. Nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            echo "tag=$current_tag" >> "$GITHUB_OUTPUT"
            echo "commit_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cargo set-version "$next_version"

          cargo check

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "commit_changes=true" >> "$GITHUB_OUTPUT"

      - name: Generate release notes (git-cliff)
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit, tag, and push
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'true' }}
        uses: EndBug/add-and-commit@v10
        with:
          add: "Cargo.toml Cargo.lock"
          default_author: github_actions
          message: "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          tag: "${{ steps.bump.outputs.tag }}"
          push: true

      - name: Push tag only
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'false' }}
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Upload release notes
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md

  build-artifacts:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev pkg-config \
            libxkbcommon-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP="PulseLayer.app"
          VERSION="${{ needs.prepare-release.outputs.version }}"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "target/${{ matrix.target }}/release/pulse-layer" "$APP/Contents/MacOS/pulse-layer"
          sed "s/__VERSION__/$VERSION/" macos/Info.plist > "$APP/Contents/Info.plist"
          chmod +x "$APP/Contents/MacOS/pulse-layer"
          codesign --force --deep --sign - "$APP"
          mkdir dist
          tar -czf "dist/pulse-layer-${{ matrix.target }}.tar.gz" "$APP"

      - name: Package Windows exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/pulse-layer.exe" `
            -DestinationPath "dist/pulse-layer-${{ matrix.target }}.zip"

      - name: Package Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir dist
          tar -C "target/${{ matrix.target }}/release" \
              -czf "dist/pulse-layer-${{ matrix.target }}.tar.gz" \
              pulse-layer

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: dist/*

  publish-release:
    needs:
      - prepare-release
      - build-artifacts
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes.md
          files: dist/*
