name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "overlay/src/**"
      - "overlay/index.html"
      - "overlay/package.json"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: release-main
  cancel-in-progress: true

permissions: {}

jobs:
  prepare-release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      released: ${{ steps.bump.outputs.released }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      commit_changes: ${{ steps.bump.outputs.commit_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2.75.23
        with:
          tool: cargo-edit

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev pkg-config \
            libxkbcommon-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev

      - name: Install overlay dependencies
        run: npm ci
        working-directory: overlay

      - name: Determine next version (git-cliff)
        id: cliff_bumped
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --bumped-version
        env:
          OUTPUT: bumped-version.txt
          GITHUB_REPO: ${{ github.repository }}

      - name: Bump project version
        id: bump
        shell: bash
        env:
          CLIFF_BUMPED_VERSION: ${{ steps.cliff_bumped.outputs.content }}
        run: bash scripts/bump-version.sh

      - name: Generate release notes (git-cliff)
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit, tag, and push
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'true' }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "Cargo.toml Cargo.lock"
          default_author: github_actions
          message: "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          tag: "${{ steps.bump.outputs.tag }}"
          push: true

      - name: Push tag only
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'false' }}
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Upload release notes
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-notes
          path: release-notes.md

  build-artifacts:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-latest
            target: i686-pc-windows-msvc
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install Linux system dependencies (native)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev pkg-config \
            libxkbcommon-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP="PulseLayer.app"
          VERSION="${{ needs.prepare-release.outputs.version }}"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "target/${{ matrix.target }}/release/pulse-layer" "$APP/Contents/MacOS/pulse-layer"
          sed "s/__VERSION__/$VERSION/" macos/Info.plist > "$APP/Contents/Info.plist"
          chmod +x "$APP/Contents/MacOS/pulse-layer"
          codesign --force --deep --sign - "$APP"
          mkdir dist
          tar -czf "dist/pulse-layer-${{ matrix.target }}.tar.gz" "$APP"

      - name: Package Windows exe
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/pulse-layer.exe" `
            -DestinationPath "dist/pulse-layer-${{ matrix.target }}.zip"

      - name: Package Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir dist
          tar -C "target/${{ matrix.target }}/release" \
              -czf "dist/pulse-layer-${{ matrix.target }}.tar.gz" \
              pulse-layer

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: dist/*

  publish-release:
    needs:
      - prepare-release
      - build-artifacts
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-notes
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes.md
          files: dist/*
