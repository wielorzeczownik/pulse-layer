<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PulseLayer Overlay</title>
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="heart-widget" class="panel off">
      <span id="heart" class="heart">♥</span>
      <div class="hw-data">
        <span id="hw-bpm" class="hw-bpm">--</span>
        <span class="bpm-label hw-label">bpm</span>
      </div>
    </div>
    <div id="ecg-widget" class="panel off">
      <svg id="ecg-svg" height="44" viewBox="0 0 200 44" width="200">
        <line
          stroke="rgba(255,255,255,0.06)"
          stroke-width="1"
          x1="0"
          x2="200"
          y1="22"
          y2="22"
        />
        <path
          id="ecg-path"
          d="M0,22 L30,22 L33,20 L36,22 L41,25 L43,3 L46,36 L49,22 L65,22 L71,17 L80,17 L86,22 L200,22"
          fill="none"
          pathLength="1"
          stroke="rgba(255,255,255,0.5)"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
        />
      </svg>
      <div class="ecg-bottom">
        <span id="ecg-bpm" class="ecg-bpm">--</span>
        <span class="bpm-label">bpm</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
